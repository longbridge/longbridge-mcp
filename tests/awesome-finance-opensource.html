<style>
:root {
  --ground:   #0C1118;
  --surface:  #131D2B;
  --surface2: #192537;
  --border:   #1E3050;
  --text:     #D4DDE8;
  --muted:    #6B8099;
  --accent:   #00C4A7;
  --amber:    #F5A22A;
  --red:      #E05555;
  --blue:     #5B9BD5;
  --mono: 'Cascadia Code','Fira Code','SF Mono','Consolas','Menlo',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
  --sidebar: 230px;
  --gap: 24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ground);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;display:flex;min-height:100vh}

/* sidebar */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);position:fixed;top:0;left:0;bottom:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-head{padding:20px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-head .logo{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
.sidebar-head .stat{font-size:11px;color:var(--muted);margin-top:4px}
.sidebar-nav{padding:8px 0;overflow-y:auto;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:5px 16px;text-decoration:none;color:var(--muted);font-size:12px;transition:color .15s,background .15s;border-left:2px solid transparent}
.nav-item:hover,.nav-item.active{color:var(--text);background:var(--surface2);border-left-color:var(--accent)}
.nav-item.active .nav-num{opacity:1}
.nav-num{font-family:var(--mono);font-size:10px;color:var(--accent);opacity:.6;min-width:22px;flex-shrink:0}

/* main */
#main{margin-left:var(--sidebar);flex:1;min-width:0}
.topbar{position:sticky;top:0;background:rgba(12,17,24,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px var(--gap);display:flex;align-items:baseline;gap:16px;z-index:50}
.topbar h1{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.topbar .tagline{font-size:12px;color:var(--muted)}
.topbar .badges{margin-left:auto;display:flex;gap:8px}
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600}
.badge-teal{background:rgba(0,196,167,.12);color:var(--accent);border:1px solid rgba(0,196,167,.25)}
.badge-amber{background:rgba(245,162,42,.12);color:var(--amber);border:1px solid rgba(245,162,42,.25)}

#content{padding:var(--gap);max-width:1200px}

.legend{display:flex;flex-wrap:wrap;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:28px;font-size:12px;color:var(--muted)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-sep{width:1px;background:var(--border);align-self:stretch}

/* sections */
.section{margin-bottom:32px;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-num{font-family:var(--mono);font-size:11px;color:var(--accent);opacity:.7;letter-spacing:.05em;flex-shrink:0}
.section-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.03em}
.section-en{font-size:11px;color:var(--muted);font-weight:400}
.section-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}
.section-note{font-size:11px;color:var(--muted);padding:8px 10px;background:rgba(19,29,43,.5);border-left:2px solid var(--border);margin-bottom:8px;border-radius:0 4px 4px 0}

/* table */
.proj-table{width:100%;border-collapse:collapse;font-size:13px}
.proj-table th{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:6px 8px;background:var(--surface);border-bottom:1px solid var(--border)}
.proj-table td{padding:7px 8px;border-bottom:1px solid rgba(30,48,80,.5);vertical-align:middle}
.proj-table tr:last-child td{border-bottom:none}
.proj-table tbody tr{background:var(--surface);transition:background .12s}
.proj-table tbody tr:hover{background:var(--surface2)}
.proj-table tbody tr:nth-child(even){background:rgba(19,29,43,.6)}
.proj-table tbody tr:nth-child(even):hover{background:var(--surface2)}

.proj-name{font-weight:600;color:var(--text);min-width:130px}
.proj-name a{color:inherit;text-decoration:none;display:flex;align-items:center;gap:6px}
.proj-name a:hover{color:var(--accent)}
.archived-tag{font-size:9px;color:var(--red);font-family:var(--mono);opacity:.8;font-weight:400;border:1px solid rgba(224,85,85,.3);padding:0 3px;border-radius:2px}

.proj-desc{color:var(--muted);font-size:12px;max-width:300px}

/* stars */
.stars-cell{white-space:nowrap;min-width:80px}
.stars-num{font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:600}
.stars-bar{display:block;height:2px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
.stars-fill{display:block;height:100%;background:var(--amber);border-radius:2px;opacity:.6}

/* lang */
.lang-pill{font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:3px;background:rgba(30,48,80,.8);color:var(--muted);border:1px solid var(--border);white-space:nowrap}
.lang-py {color:#4ec9b0;border-color:rgba(78,201,176,.2);background:rgba(78,201,176,.05)}
.lang-js {color:#f0c674;border-color:rgba(240,198,116,.2);background:rgba(240,198,116,.05)}
.lang-ts {color:#569cd6;border-color:rgba(86,156,214,.2);background:rgba(86,156,214,.05)}
.lang-cs {color:#9b59b6;border-color:rgba(155,89,182,.2);background:rgba(155,89,182,.05)}
.lang-cpp{color:#00b4d8;border-color:rgba(0,180,216,.2);background:rgba(0,180,216,.05)}
.lang-go {color:#79c0ff;border-color:rgba(121,192,255,.2);background:rgba(121,192,255,.05)}
.lang-rs {color:#e07b54;border-color:rgba(224,123,84,.2);background:rgba(224,123,84,.05)}
.lang-java{color:#f89820;border-color:rgba(248,152,32,.2);background:rgba(248,152,32,.05)}
.lang-php{color:#a78bfa;border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.05)}
.lang-rb {color:#cc342d;border-color:rgba(204,52,45,.2);background:rgba(204,52,45,.05)}

.market-cn{font-size:10px;font-family:var(--mono);color:#f0c674;padding:1px 4px;border-radius:2px;border:1px solid rgba(240,198,116,.25);background:rgba(240,198,116,.07)}

const MAX_STARS = 112000;

function parseStars(s){
  if(!s)return 0;
  s=s.replace(/[~,]/g,'').trim();
  if(s.endsWith('k'))return parseFloat(s)*1000;
  return parseInt(s)||0;
}
function langClass(l){
  if(!l)return'';
  const m=l.toLowerCase();
  if(m.includes('python'))return'lang-py';
  if(m.includes('typescript')||m==='ts')return'lang-ts';
  if(m.includes('javascript')||m==='js')return'lang-js';
  if(m.includes('rust'))return'lang-rs';
  if((m==='go'||m.includes('/go')||m.startsWith('go/'))&&!m.includes('golang')||m==='go')return'lang-go';
  if(m.includes('java')&&!m.includes('javascript'))return'lang-java';
  if(m.includes('c#'))return'lang-cs';
  if(m.includes('c++'))return'lang-cpp';
  if(m.includes('php'))return'lang-php';
  if(m.includes('ruby')||m==='rb')return'lang-rb';
  return'';
}
function marketBadge(m){
  if(!m)return'';
  if(m.includes('⛓️')||m.includes('加密')||m.includes('crypto'))return'<span class="market-crypto">CRYPTO</span>';
  if(m.includes('🇨🇳')&&(m.includes('+')||m.includes('H')||m.includes('港')))return'<span class="market-cn">CN+</span>';
  if(m.includes('🇨🇳'))return'<span class="market-cn">A股</span>';
  if(m.includes('🌍'))return'<span style="font-size:13px">🌍</span>';
  return`<span style="font-size:12px">${m}</span>`;
}
function apiBadge(v){
  if(v==='Y')return'<span class="api-y">需数据</span>';
  if(v==='N')return'<span class="api-n">自包含</span>';
  if(v==='opt')return'<span class="api-opt">可选</span>';
  return'';
}
function contactBadge(v){

// Build nav
const nav=document.getElementById('navLinks');
CATS.forEach(cat=>{
  const a=document.createElement('a');
  a.className='nav-item';
  a.href=`#cat-${cat.n}`;
  a.innerHTML=`<span class="nav-num">${cat.n}</span>${cat.zh}`;
  nav.appendChild(a);
});

// Build sections
const container=document.getElementById('sections');
CATS.forEach((cat,i)=>{
  const sec=document.createElement('section');
  sec.className='section';
  sec.id=`cat-${cat.n}`;
  sec.style.animationDelay=`${i*0.025}s`;

  sec.innerHTML=`
    <div class="section-head">
      <span class="section-num">${cat.n}</span>
      <div><span class="section-title">${cat.zh}</span><span class="section-en"> / ${cat.en}</span></div>
      <span class="section-count">${cat.projects.length} 项目</span>
    </div>
    ${cat.note?`<div class="section-note">${cat.note}</div>`:''}
    <table class="proj-table">
      <thead>
        <tr>
          <th>项目</th>
          <th>Stars</th>
          <th>语言</th>
          <th>市场</th>
          <th>三方接口</th>
          <th>值得联系</th>
          <th>简介</th>
        </tr>
      </thead>
      <tbody>
        ${cat.projects.map(p=>{
          const num=parseStars(p.stars);
          const pct=Math.min(100,(num/MAX_STARS)*100);
          const isArchived=p.desc&&p.desc.includes('⚠️');
          return`<tr>
            <td class="proj-name"><a href="${p.url}" target="_blank" rel="noopener">${p.name}${isArchived?'<span class="archived-tag">ARCHIVED</span>':''}</a></td>
            <td class="stars-cell"><span class="stars-num">${p.stars}</span><span class="stars-bar"><span class="stars-fill" style="width:${pct}%"></span></span></td>
            <td><span class="lang-pill ${langClass(p.lang)}">${p.lang}</span></td>
            <td>${marketBadge(p.market)}</td>
            <td>${apiBadge(p.api)}</td>
            <td>${contactBadge(p.contact)}</td>
            <td class="proj-desc">${p.desc}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  container.appendChild(sec);
});

// Active nav on scroll
const allSections=document.querySelectorAll('.section');
const navItems=document.querySelectorAll('.nav-item');
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      navItems.forEach(n=>n.classList.remove('active'));
      const id=e.target.id.replace('cat-','');
      const active=document.querySelector(`.nav-item[href="#cat-${id}"]`);
      if(active)active.classList.add('active');
    }
  });
},{threshold:0.15});
allSections.forEach(s=>obs.observe(s));
</script>
